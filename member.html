<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Member - SOPARXXZ</title>
  <link rel="stylesheet" href="transition.css"/>
  <link rel="stylesheet" href="owner.css"/>
  <style>
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn-add:active { transform: scale(0.95); opacity: 0.9; }

    .btn-add svg {
      width: 16px; height: 16px;
      stroke: #fff; fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    /* MEMBER LIST - horizontal scroll */
    .member-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .member-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      position: relative;
    }

    .member-card:active { transform: scale(0.97); }
    .member-card:hover {
      background: rgba(168,85,247,0.07);
      border-color: rgba(168,85,247,0.2);
    }

    .member-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .member-info {
      flex: 1;
      min-width: 0;
    }

    .member-info h3 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .member-info span {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.5px;
    }

    .member-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.inactive { background: rgba(255,255,255,0.2); }

    .status-active { color: #22c55e; }
    .status-inactive { color: rgba(255,255,255,0.3); }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: #10102a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px 24px;
      width: 90%;
      max-width: 340px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .modal-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: 'Rajdhani', sans-serif;
      outline: none;
      margin-bottom: 12px;
      transition: border 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .modal-input:focus {
      border-color: #a855f7;
      transform: scale(1.03);
      box-shadow: 0 4px 16px rgba(168,85,247,0.2);
    }

    .modal-input::placeholder { color: rgba(255,255,255,0.25); }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .modal-btn:active { transform: scale(0.95); }

    .btn-cancel {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-save {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
    }

    /* DETAIL MODAL */
    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .btn-delete {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      color: #f87171;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-delete:active { transform: scale(0.95); }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.2);
    }

    .empty-state svg {
      width: 48px; height: 48px;
      stroke: rgba(255,255,255,0.1);
      fill: none; stroke-width: 1.5;
      stroke-linecap: round;
      margin-bottom: 14px;
    }

    .empty-state p { font-size: 13px; letter-spacing: 0.5px; }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="Logo"/>
      <div class="sidebar-logo-text">
        <h2>SOPARXXZ</h2>
        <span>Powered by Sopar</span>
      </div>
    </div>

    <div class="nav-section">
      <p class="nav-label">Menu</p>
      <a href="owner.html" class="nav-item" onclick="goTo('owner.html'); return false;">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="#" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Member
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Statistik
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Setting
      </a>
      <a href="#" class="nav-item danger" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>

    <div class="sidebar-bottom">
      <div class="user-card">
        <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="User"/>
        <div class="user-card-text">
          <h4 id="displayName">OWNER</h4>
          <span id="displayRole">Owner</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="top-bar">
      <div>
        <h1 class="page-title">MEMBER</h1>
        <p class="page-sub">Kelola semua member</p>
      </div>
      <button class="btn-add" onclick="openAddModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah
      </button>
    </div>

    <div class="member-list" id="memberList">
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <p>Belum ada member</p>
      </div>
    </div>
  </div>

  <!-- MODAL TAMBAH -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>TAMBAH MEMBER</h3>
      <input class="modal-input" type="text" id="newUsername" placeholder="Username..."/>
      <input class="modal-input" type="password" id="newPassword" placeholder="Password..."/>
      <div class="modal-btns">
        <button class="modal-btn btn-cancel" onclick="closeAddModal()">Batal</button>
        <button class="modal-btn btn-save" onclick="addMember()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- MODAL DETAIL -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <h3 id="detailTitle">DETAIL MEMBER</h3>
      <div class="detail-row">
        <span class="detail-label">Username</span>
        <span class="detail-value" id="detailUsername">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Password</span>
        <span class="detail-value" id="detailPassword">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Role</span>
        <span class="detail-value" id="detailRole">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value" id="detailStatus">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Dibuat</span>
        <span class="detail-value" id="detailCreated">-</span>
      </div>
      <button class="btn-delete" onclick="deleteMember()">Putuskan Akun</button>
      <div class="modal-btns" style="margin-top:10px;">
        <button class="modal-btn btn-cancel" onclick="closeDetailModal()">Tutup</button>
      </div>
    </div>
  </div>

  <audio id="bgMusic" src="assets/musik.mp3" loop></audio>

  <script src="transition.js"></script>
  <script>
    const API = 'http://103.67.244.75:3000';
    let selectedUsername = null;

    // Cek session
    const savedUser = sessionStorage.getItem('loggedUser');
    if (!savedUser) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(savedUser);
      document.getElementById('displayName').textContent = user.username.toUpperCase();
      document.getElementById('displayRole').textContent = user.role === 'owner' ? '👑 Owner' : '👤 Member';
    }

    // Load members
    async function loadMembers() {
      try {
        const res = await fetch(`${API}/members`);
        const members = await res.json();
        renderMembers(members);
      } catch (err) {
        document.getElementById('memberList').innerHTML = `
          <div class="empty-state"><p>Gagal konek ke VPS</p></div>`;
      }
    }

    function renderMembers(members) {
      const list = document.getElementById('memberList');
      if (!members.length) {
        list.innerHTML = `<div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <p>Belum ada member</p></div>`;
        return;
      }

      list.innerHTML = members.map(m => `
        <div class="member-card" onclick="openDetail('${m.username}')">
          <div class="member-avatar">${m.username[0].toUpperCase()}</div>
          <div class="member-info">
            <h3>${m.username}</h3>
            <span>${m.role} • ${new Date(m.createdAt).toLocaleDateString('id-ID')}</span>
          </div>
          <div class="member-status">
            <div class="dot ${m.active ? 'active' : 'inactive'}"></div>
            <span class="${m.active ? 'status-active' : 'status-inactive'}">${m.active ? 'Aktif' : 'Nonaktif'}</span>
          </div>
        </div>
      `).join('');
    }

    // Add member
    function openAddModal() {
      document.getElementById('addModal').classList.add('show');
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('show');
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
    }

    async function addMember() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      if (!username || !password) return alert('Username dan password wajib diisi!');

      try {
        const res = await fetch(`${API}/members`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role: 'member' })
        });
        const data = await res.json();
        if (data.success) {
          closeAddModal();
          loadMembers();
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('Gagal konek ke VPS!');
      }
    }

    // Detail member
    async function openDetail(username) {
      selectedUsername = username;
      try {
        const res = await fetch(`${API}/members/${username}`);
        const m = await res.json();
        document.getElementById('detailTitle').textContent = m.username.toUpperCase();
        document.getElementById('detailUsername').textContent = m.username;
        document.getElementById('detailPassword').textContent = m.password;
        document.getElementById('detailRole').textContent = m.role;
        document.getElementById('detailStatus').textContent = m.active ? '✅ Aktif' : '❌ Nonaktif';
        document.getElementById('detailCreated').textContent = new Date(m.createdAt).toLocaleString('id-ID');
        document.getElementById('detailModal').classList.add('show');
      } catch (err) {
        alert('Gagal ambil detail member!');
      }
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('show');
      selectedUsername = null;
    }

    async function deleteMember() {
      if (!selectedUsername) return;
      if (!confirm(`Hapus member ${selectedUsername}?`)) return;

      try {
        const res = await fetch(`${API}/members/${selectedUsername}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          closeDetailModal();
          loadMembers();
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('Gagal hapus member!');
      }
    }

    // Music
    const music = document.getElementById('bgMusic');
    window.addEventListener('load', () => {
      music.play().catch(() => {});
    });
    document.addEventListener('click', () => {
      if (music.paused) music.play().catch(() => {});
    }, { once: true });

    function logout() {
      sessionStorage.removeItem('loggedUser');
      goTo('index.html');
    }

    loadMembers();
  </script>

</body>
</html>
