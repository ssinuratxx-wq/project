<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Setting - SOPARXXZ</title>
  <link rel="stylesheet" href="transition.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #07071a;
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      background: rgba(7,7,26,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .top-bar-logo { display: flex; align-items: center; gap: 10px; }
    .top-bar-logo img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1.5px solid #a855f7; }
    .top-bar-logo span { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 1px; }

    .menu-btn {
      width: 38px; height: 38px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .menu-btn:active { transform: scale(0.92); }
    .menu-btn svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }

    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: 90; }
    .drawer-overlay.show { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .drawer {
      position: fixed; top: 0; right: -280px; width: 260px; height: 100vh;
      background: #10102a; border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 100; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column; padding: 24px 0;
    }
    .drawer.show { right: 0; }

    .drawer-header { display: flex; align-items: center; gap: 12px; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .drawer-header img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #a855f7; }
    .drawer-header h4 { font-size: 14px; font-weight: 700; }
    .drawer-header span { font-size: 11px; color: #a855f7; }

    .drawer-nav { padding: 16px 12px 0; flex: 1; }

    .drawer-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px; border-radius: 12px; cursor: pointer; margin-bottom: 4px;
      text-decoration: none; color: rgba(255,255,255,0.6);
      font-size: 14px; font-weight: 600;
      transition: background 0.2s, transform 0.15s, color 0.2s;
    }
    .drawer-item:active { transform: scale(0.96); }
    .drawer-item:hover { background: rgba(168,85,247,0.1); color: #fff; }
    .drawer-item.active { background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(168,85,247,0.1)); color: #fff; }
    .drawer-item svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.5); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .drawer-item.active svg { stroke: #a855f7; }
    .drawer-item.danger { color: rgba(239,68,68,0.6); }
    .drawer-item.danger svg { stroke: rgba(239,68,68,0.6); }

    .main {
      padding: 24px 20px 60px;
      max-width: 480px;
      margin: 0 auto;
    }

    .page-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; font-weight: 900; letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .page-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 24px; }

    .setting-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px 22px;
    }

    .setting-card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .setting-card-title svg {
      width: 18px; height: 18px;
      stroke: #a855f7; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .form-group { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 7px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-family: 'Rajdhani', sans-serif;
      outline: none;
      transition: border 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus {
      border-color: #a855f7;
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(168,85,247,0.2);
    }

    input::placeholder { color: rgba(255,255,255,0.25); }

    select option { background: #10102a; }

    .btn-submit {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn-submit:active { transform: scale(0.96); opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; pointer-events: none; }

    .msg-box {
      display: none;
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 12px;
    }

    .msg-box.show { display: block; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .msg-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .msg-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-bar-logo">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="Logo"/>
      <span>SOPARXXZ</span>
    </div>
    <div class="menu-btn" onclick="toggleDrawer()">
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="12" y1="12" x2="12.01" y2="12"/><line x1="21" y1="12" x2="21.01" y2="12"/></svg>
    </div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="User"/>
      <div>
        <h4 id="displayName">OWNER</h4>
        <span>👑 Owner</span>
      </div>
    </div>

    <div class="drawer-nav">
      <a href="#" class="drawer-item" onclick="goTo('owner.html'); return false;">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="#" class="drawer-item active">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Setting
      </a>
      <a href="#" class="drawer-item danger" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </div>

  <div class="main">
    <h1 class="page-title">SETTING</h1>
    <p class="page-sub">Kelola akun login</p>

    <div class="setting-card">
      <div class="setting-card-title">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Tambah Akun Baru
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="newUsername" placeholder="Masukkan username..." />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="text" id="newPassword" placeholder="Masukkan password..." />
      </div>

      <div class="form-group">
        <label>Role</label>
        <select id="newRole">
          <option value="member">Member</option>
          <option value="owner">Owner</option>
        </select>
      </div>

      <button class="btn-submit" id="btnSubmit" onclick="addAccount()">SIMPAN AKUN</button>

      <div class="msg-box" id="msgBox"></div>
    </div>
  </div>

  <script src="transition.js"></script>
  <script>
    const API = 'https://partly-easter-flashing.ngrok-free.dev';

    const savedUser = sessionStorage.getItem('loggedUser');
    if (!savedUser) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(savedUser);
      document.getElementById('displayName').textContent = user.username.toUpperCase();
    }

    function toggleDrawer() {
      document.getElementById('drawer').classList.toggle('show');
      document.getElementById('drawerOverlay').classList.toggle('show');
    }

    async function addAccount() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      const role = document.getElementById('newRole').value;
      const btn = document.getElementById('btnSubmit');
      const msgBox = document.getElementById('msgBox');

      msgBox.classList.remove('show', 'msg-error', 'msg-success');

      if (!username || !password) {
        msgBox.textContent = 'Username dan password wajib diisi!';
        msgBox.classList.add('show', 'msg-error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'MENYIMPAN...';

      try {
        const res = await fetch(`${API}/members?ngrok-skip-browser-warning=true`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role })
        });
        const data = await res.json();

        if (data.success) {
          msgBox.textContent = `Akun "${username}" berhasil ditambahkan sebagai ${role}!`;
          msgBox.classList.add('show', 'msg-success');
          document.getElementById('newUsername').value = '';
          document.getElementById('newPassword').value = '';
        } else {
          msgBox.textContent = data.error || 'Gagal menyimpan akun!';
          msgBox.classList.add('show', 'msg-error');
        }
      } catch (err) {
        msgBox.textContent = 'Gagal konek ke server!';
        msgBox.classList.add('show', 'msg-error');
      }

      btn.disabled = false;
      btn.textContent = 'SIMPAN AKUN';
    }

    function logout() {
      sessionStorage.removeItem('loggedUser');
      goTo('index.html');
    }
  </script>

</body>
</html>
