<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - SOPARXXZ</title>
  <link rel="stylesheet" href="transition.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      background: url('https://i.ibb.co.com/q35Rcw5D/IMG-20260629-WA0031.png') center/cover no-repeat fixed;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(2px);
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .profile-wrap {
      position: relative;
      width: 90px;
      height: 90px;
    }

    .profile-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #6366f1, #a855f7);
      animation: spin 3s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .profile-pic {
      position: absolute;
      inset: 4px;
      width: calc(100% - 8px);
      height: calc(100% - 8px);
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #0f0f0f;
    }

    .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      animation: glow 2.5s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 15px rgba(168,85,247,0.8); }
      50% { text-shadow: 0 0 30px rgba(168,85,247,1), 0 0 50px rgba(99,102,241,0.6); }
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
      margin-top: -6px;
    }

    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 6px;
    }

    .input-wrap {
      width: 100%;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 7px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-family: 'Rajdhani', sans-serif;
      outline: none;
      transition: border 0.25s, background 0.25s, transform 0.25s, box-shadow 0.25s;
    }

    input::placeholder { color: rgba(255,255,255,0.25); }

    input:focus {
      border-color: #a855f7;
      background: rgba(168,85,247,0.08);
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(168,85,247,0.2);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      margin-top: 4px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1.5px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(139,92,246,0.4);
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn-login:active { transform: scale(0.97); opacity: 0.9; }

    .back {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }

    .back:hover { color: #a855f7; }

    .error-msg {
      display: none;
      width: 100%;
      padding: 10px 14px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="card">
    <div class="profile-wrap">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="Profile" class="profile-pic" />
    </div>

    <h1 class="name">SOPARXXZ</h1>
    <p class="subtitle">Masuk ke akun Anda</p>

    <div class="form">
      <div class="input-wrap">
        <label>Username</label>
        <input type="text" id="inputUser" placeholder="Masukkan username..." />
      </div>

      <div class="input-wrap">
        <label>Password</label>
        <input type="password" id="inputPass" placeholder="Masukkan password..." />
      </div>

      <div class="error-msg" id="errorMsg">Username atau password salah!</div>

      <button class="btn-login" id="btnLogin">SIGN IN</button>
    </div>

    <a href="#" onclick="goTo('index.html')" class="back">← Kembali</a>
  </div>

<script src="transition.js"></script>
<script src="script.js"></script>
</body>
</html>
