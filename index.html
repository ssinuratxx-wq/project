<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://i.ibb.co.com/q35Rcw5D/IMG-20260629-WA0031.png') center/cover no-repeat fixed;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(2px);
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 44px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .profile-pic {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 14px;
      border: 3px solid rgba(167,139,250,0.7);
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }

    .logo-area h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .logo-area p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border 0.25s, background 0.25s, transform 0.25s, box-shadow 0.25s;
      transform: scale(1);
    }

    input::placeholder { color: rgba(255,255,255,0.3); }

    input:focus {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.1);
      transform: scale(1.04);
      box-shadow: 0 4px 20px rgba(167,139,250,0.25);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }


  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="card">
    <div class="logo-area">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="Profile" class="profile-pic" />
      <h1>NAMA KAMU</h1>
      <p>Masuk ke akun Anda</p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="inputUser" placeholder="" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="inputPass" placeholder="" />
    </div>

    <button class="btn-login">MASUK</button>

  </div>

  <script>
    function typeWriter(el, text, speed, callback) {
      let i = 0;
      el.value = '';
      const interval = setInterval(() => {
        el.value += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          if (callback) setTimeout(callback, 400);
        }
      }, speed);
    }

    function eraseWriter(el, speed, callback) {
      const interval = setInterval(() => {
        el.value = el.value.slice(0, -1);
        if (el.value.length === 0) {
          clearInterval(interval);
          if (callback) setTimeout(callback, 300);
        }
      }, speed);
    }

    function runAnimation() {
      const userEl = document.getElementById('inputUser');
      const passEl = document.getElementById('inputPass');

      typeWriter(userEl, 'username kamu...', 80, () => {
        eraseWriter(userEl, 40, () => {
          typeWriter(passEl, 'password kamu...', 80, () => {
            eraseWriter(passEl, 40, () => {
              setTimeout(runAnimation, 600);
            });
          });
        });
      });
    }

    window.addEventListener('load', () => {
      setTimeout(runAnimation, 800);
    });
  </script>

</body>
</html>
