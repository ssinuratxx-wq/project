<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOPARXXZ</title>
  <link rel="stylesheet" href="transition.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      background: url('https://i.ibb.co.com/q35Rcw5D/IMG-20260629-WA0031.png') center/cover no-repeat fixed;
      overflow-x: hidden;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .profile-wrap {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .profile-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #6366f1, #a855f7);
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .profile-pic {
      position: absolute;
      inset: 4px;
      width: calc(100% - 8px);
      height: calc(100% - 8px);
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #0f0f0f;
    }

    .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-align: center;
      animation: glow 2.5s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px rgba(168,85,247,0.8); }
      50% { text-shadow: 0 0 40px rgba(168,85,247,1), 0 0 60px rgba(99,102,241,0.6); }
    }

    .powered {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
      background: rgba(255,255,255,0.06);
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 4px 0;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.5px;
    }

    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .btn-signin {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      box-shadow: 0 4px 24px rgba(139,92,246,0.4);
    }

    .btn-wa {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-wa:hover {
      background: rgba(37,211,102,0.15);
      border-color: #25d366;
      box-shadow: 0 4px 20px rgba(37,211,102,0.2);
    }

    .btn-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .footer {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      margin-top: 8px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="container">

    <div class="profile-wrap">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="Profile" class="profile-pic" />
    </div>

    <h1 class="name">SOPARXXZ</h1>
    <p class="powered">Powered by Sopar</p>

    <div class="badges">
      <div class="badge">🛡️ Secure</div>
      <div class="badge">⚡ Fast</div>
      <div class="badge">✅ Reliable</div>
    </div>

    <div class="buttons">
      <a href="#" onclick="goTo('login.html')" class="btn btn-signin">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="white"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4v-2h4V5h-4V3zM10 17l5-5-5-5v10z"/></svg>
        Sign In
      </a>

      <a href="https://wa.me/6283163624429" target="_blank" class="btn btn-wa">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="#25d366">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.132 1.527 5.874L.057 23.527l5.773-1.517A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.374l-.359-.213-3.428.9.916-3.349-.233-.374A9.818 9.818 0 1112 21.818z"/>
        </svg>
        WhatsApp
      </a>
    </div>

    <p class="footer">© 2026 SOPARXXZ</p>

  </div>

<script src="transition.js"></script>
</body>
</html>
