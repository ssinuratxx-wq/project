<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Member - SOPARXXZ</title>
  <link rel="stylesheet" href="transition.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #07071a;
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      background: rgba(7,7,26,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .top-bar-logo { display: flex; align-items: center; gap: 10px; }
    .top-bar-logo img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1.5px solid #a855f7; }
    .top-bar-logo span { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 1px; }

    .menu-btn {
      width: 38px; height: 38px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .menu-btn:active { transform: scale(0.92); }
    .menu-btn svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }

    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: 90; }
    .drawer-overlay.show { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .drawer {
      position: fixed; top: 0; right: -280px; width: 260px; height: 100vh;
      background: #10102a; border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 100; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column; padding: 24px 0;
    }
    .drawer.show { right: 0; }

    .drawer-header { display: flex; align-items: center; gap: 12px; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .drawer-header img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #a855f7; }
    .drawer-header h4 { font-size: 14px; font-weight: 700; }
    .drawer-header span { font-size: 11px; color: #a855f7; }

    .drawer-nav { padding: 16px 12px 0; flex: 1; }

    .drawer-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px; border-radius: 12px; cursor: pointer; margin-bottom: 4px;
      text-decoration: none; color: rgba(255,255,255,0.6);
      font-size: 14px; font-weight: 600;
      transition: background 0.2s, transform 0.15s, color 0.2s;
    }
    .drawer-item:active { transform: scale(0.96); }
    .drawer-item:hover { background: rgba(168,85,247,0.1); color: #fff; }
    .drawer-item.active { background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(168,85,247,0.1)); color: #fff; }
    .drawer-item svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.5); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .drawer-item.active svg { stroke: #a855f7; }
    .drawer-item.danger { color: rgba(239,68,68,0.6); }
    .drawer-item.danger svg { stroke: rgba(239,68,68,0.6); }

    .main {
      padding: 24px 20px 60px;
      max-width: 600px;
      margin: 0 auto;
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .page-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; font-weight: 900; letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .page-sub { font-size: 12px; color: rgba(255,255,255,0.35); }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }

    .btn-add:active { transform: scale(0.95); opacity: 0.9; }
    .btn-add svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    .member-list { display: flex; flex-direction: column; gap: 10px; }

    .member-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
    }

    .member-card:active { transform: scale(0.97); }
    .member-card:hover { background: rgba(168,85,247,0.07); border-color: rgba(168,85,247,0.2); }

    .member-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 16px; font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .member-info { flex: 1; min-width: 0; }

    .member-info h3 {
      font-size: 14px; font-weight: 700; color: #fff;
      letter-spacing: 0.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .member-info span { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; }

    .member-status { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }

    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.inactive { background: rgba(255,255,255,0.2); }

    .status-active { color: #22c55e; }
    .status-inactive { color: rgba(255,255,255,0.3); }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center; justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: #10102a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px 24px;
      width: 90%; max-width: 340px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal h3 { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; color: #fff; letter-spacing: 1px; margin-bottom: 20px; }

    .modal-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: 'Rajdhani', sans-serif;
      outline: none;
      margin-bottom: 12px;
      transition: border 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .modal-input:focus { border-color: #a855f7; transform: scale(1.03); box-shadow: 0 4px 16px rgba(168,85,247,0.2); }
    .modal-input::placeholder { color: rgba(255,255,255,0.25); }

    .modal-btns { display: flex; gap: 10px; margin-top: 6px; }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .modal-btn:active { transform: scale(0.95); }
    .btn-cancel { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }
    .btn-save { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; }

    .detail-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 1px; text-transform: uppercase; }
    .detail-value { font-size: 13px; font-weight: 700; color: #fff; }

    .btn-delete {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      color: #f87171;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-delete:active { transform: scale(0.95); }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.2); }
    .empty-state svg { width: 48px; height: 48px; stroke: rgba(255,255,255,0.1); fill: none; stroke-width: 1.5; stroke-linecap: round; margin-bottom: 14px; }
    .empty-state p { font-size: 13px; letter-spacing: 0.5px; }

    #musicBtn {
      position: fixed; bottom: 20px; right: 20px; z-index: 60;
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(168,85,247,0.2);
      border: 1.5px solid rgba(168,85,247,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(10px);
      transition: background 0.2s, transform 0.15s;
    }
    #musicBtn:active { transform: scale(0.9); }
    #musicBtn svg { width: 20px; height: 20px; stroke: #a855f7; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-logo">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="Logo"/>
      <span>SOPARXXZ</span>
    </div>
    <div class="menu-btn" onclick="toggleDrawer()">
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="12" y1="12" x2="12.01" y2="12"/><line x1="21" y1="12" x2="21.01" y2="12"/></svg>
    </div>
  </div>

  <!-- DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="User"/>
      <div>
        <h4 id="displayName">OWNER</h4>
        <span>👑 Owner</span>
      </div>
    </div>

    <div class="drawer-nav">
      <a href="#" class="drawer-item" onclick="goTo('owner.html'); return false;">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="#" class="drawer-item active">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Member
      </a>
      <a href="#" class="drawer-item" onclick="goTo('setting.html'); return false;">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Setting
      </a>
      <a href="#" class="drawer-item danger" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="top-row">
      <div>
        <h1 class="page-title">MEMBER</h1>
        <p class="page-sub">Kelola semua member</p>
      </div>
      <button class="btn-add" onclick="openAddModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah
      </button>
    </div>

    <div class="member-list" id="memberList">
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <p>Memuat data...</p>
      </div>
    </div>
  </div>

  <!-- MODAL TAMBAH -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>TAMBAH MEMBER</h3>
      <input class="modal-input" type="text" id="newUsername" placeholder="Username..."/>
      <input class="modal-input" type="text" id="newPassword" placeholder="Password..."/>
      <div class="modal-btns">
        <button class="modal-btn btn-cancel" onclick="closeAddModal()">Batal</button>
        <button class="modal-btn btn-save" onclick="addMember()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- MODAL DETAIL -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <h3 id="detailTitle">DETAIL MEMBER</h3>
      <div class="detail-row"><span class="detail-label">Username</span><span class="detail-value" id="detailUsername">-</span></div>
      <div class="detail-row"><span class="detail-label">Password</span><span class="detail-value" id="detailPassword">-</span></div>
      <div class="detail-row"><span class="detail-label">Role</span><span class="detail-value" id="detailRole">-</span></div>
      <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" id="detailStatus">-</span></div>
      <div class="detail-row"><span class="detail-label">Dibuat</span><span class="detail-value" id="detailCreated">-</span></div>
      <button class="btn-delete" onclick="deleteMember()">Putuskan Akun</button>
      <div class="modal-btns" style="margin-top:10px;">
        <button class="modal-btn btn-cancel" onclick="closeDetailModal()">Tutup</button>
      </div>
    </div>
  </div>

  <!-- MUSIC -->
  <div id="musicBtn" onclick="toggleMusic()">
    <svg id="musicIcon" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
  </div>

  <audio id="bgMusic" src="assets/musik.mp3" loop></audio>

  <script src="transition.js"></script>
  <script>
    const API = 'https://partly-easter-flashing.ngrok-free.dev';
    let selectedUsername = null;

    const savedUser = sessionStorage.getItem('loggedUser');
    if (!savedUser) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(savedUser);
      document.getElementById('displayName').textContent = user.username.toUpperCase();
    }

    function toggleDrawer() {
      document.getElementById('drawer').classList.toggle('show');
      document.getElementById('drawerOverlay').classList.toggle('show');
    }

    // Bypass ngrok warning page otomatis
    async function bypassNgrok() {
      try {
        await fetch(`${API}/members?ngrok-skip-browser-warning=true`, {
          headers: { 'ngrok-skip-browser-warning': 'true' }
        });
      } catch(e) {}
    }

    async function loadMembers() {
      try {
        await bypassNgrok();
        const res = await fetch(`${API}/members?ngrok-skip-browser-warning=true`, {
          headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        const members = await res.json();
        renderMembers(members);
      } catch (err) {
        document.getElementById('memberList').innerHTML = `
          <div class="empty-state"><p>Gagal konek ke VPS</p></div>`;
      }
    }

    function renderMembers(members) {
      const list = document.getElementById('memberList');
      if (!members.length) {
        list.innerHTML = `<div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <p>Belum ada member</p></div>`;
        return;
      }

      list.innerHTML = members.map(m => `
        <div class="member-card" onclick="openDetail('${m.username}')">
          <div class="member-avatar">${m.username[0].toUpperCase()}</div>
          <div class="member-info">
            <h3>${m.username}</h3>
            <span>${m.role} • ${new Date(m.createdAt).toLocaleDateString('id-ID')}</span>
          </div>
          <div class="member-status">
            <div class="dot ${m.active ? 'active' : 'inactive'}"></div>
            <span class="${m.active ? 'status-active' : 'status-inactive'}">${m.active ? 'Aktif' : 'Nonaktif'}</span>
          </div>
        </div>
      `).join('');
    }

    function openAddModal() { document.getElementById('addModal').classList.add('show'); }
    function closeAddModal() {
      document.getElementById('addModal').classList.remove('show');
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
    }

    async function addMember() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      if (!username || !password) return alert('Username dan password wajib diisi!');

      try {
        const res = await fetch(`${API}/members?ngrok-skip-browser-warning=true`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role: 'member' })
        });
        const data = await res.json();
        if (data.success) {
          closeAddModal();
          loadMembers();
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('Gagal konek ke VPS!');
      }
    }

    async function openDetail(username) {
      selectedUsername = username;
      try {
        const res = await fetch(`${API}/members/${username}?ngrok-skip-browser-warning=true`, {
          headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        const m = await res.json();
        document.getElementById('detailTitle').textContent = m.username.toUpperCase();
        document.getElementById('detailUsername').textContent = m.username;
        document.getElementById('detailPassword').textContent = m.password;
        document.getElementById('detailRole').textContent = m.role;
        document.getElementById('detailStatus').textContent = m.active ? '✅ Aktif' : '❌ Nonaktif';
        document.getElementById('detailCreated').textContent = new Date(m.createdAt).toLocaleString('id-ID');
        document.getElementById('detailModal').classList.add('show');
      } catch (err) {
        alert('Gagal ambil detail member!');
      }
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('show');
      selectedUsername = null;
    }

    async function deleteMember() {
      if (!selectedUsername) return;
      if (!confirm(`Hapus member ${selectedUsername}?`)) return;

      try {
        const res = await fetch(`${API}/members/${selectedUsername}?ngrok-skip-browser-warning=true`, {
          method: 'DELETE',
          headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        const data = await res.json();
        if (data.success) {
          closeDetailModal();
          loadMembers();
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('Gagal hapus member!');
      }
    }

    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const muteIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;
    const playIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>`;

    function toggleMusic() {
      if (music.paused) { music.play(); musicBtn.innerHTML = playIcon; }
      else { music.pause(); musicBtn.innerHTML = muteIcon; }
    }

    window.addEventListener('load', () => music.play().catch(() => {}));
    document.addEventListener('click', () => {
      if (music.paused) music.play().catch(() => {});
    }, { once: true });

    function logout() {
      sessionStorage.removeItem('loggedUser');
      goTo('index.html');
    }

    loadMembers();
  </script>

</body>
</html>
