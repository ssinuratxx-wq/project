<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Owner - SOPARXXZ</title>
  <link rel="stylesheet" href="transition.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* VIDEO SECTION */
    .video-section {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
    }

    .video-section video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(10,10,15,1));
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a0a2e, #2d1b69, #1a0a2e);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }

    .video-placeholder span {
      font-size: 40px;
    }

    .video-placeholder p {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
    }

    /* USER INFO */
    .user-info {
      position: relative;
      z-index: 2;
      margin-top: -60px;
      padding: 0 20px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #a855f7;
      box-shadow: 0 0 20px rgba(168,85,247,0.5);
      flex-shrink: 0;
    }

    .user-text h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1px;
    }

    .role-badge {
      display: inline-block;
      margin-top: 5px;
      padding: 3px 12px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* CONTENT */
    .content {
      padding: 10px 20px 100px;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* MENU GRID */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .menu-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      text-decoration: none;
    }

    .menu-card:active { transform: scale(0.96); }

    .menu-card:hover {
      background: rgba(168,85,247,0.1);
      border-color: rgba(168,85,247,0.3);
    }

    .menu-icon { font-size: 28px; }

    .menu-label {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .menu-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,10,15,0.95);
      border-top: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 20px;
      z-index: 10;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s;
      text-decoration: none;
    }

    .nav-item.active { opacity: 1; }
    .nav-item.active .nav-icon { color: #a855f7; }

    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; color: #fff; letter-spacing: 0.5px; }
  </style>
</head>
<body>

  <!-- VIDEO SECTION -->
  <div class="video-section">
    <!-- Ganti src video setelah upload ke GitHub -->
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="assets/ourin-mp4.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <!-- Tampil kalau video gagal load -->
    <div class="video-placeholder" id="videoPlaceholder" style="display:none;">
      <span>🎬</span>
      <p>VIDEO BELUM DIUPLOAD</p>
    </div>
  </div>

  <!-- USER INFO -->
  <div class="user-info">
    <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="Avatar" class="avatar"/>
    <div class="user-text">
      <h2 id="displayName">OWNER</h2>
      <span class="role-badge" id="displayRole">Owner</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <p class="section-title">Panel Owner</p>

    <div class="menu-grid">
      <a href="#" class="menu-card">
        <span class="menu-icon">👥</span>
        <span class="menu-label">Member</span>
        <span class="menu-desc">Kelola member</span>
      </a>
      <a href="#" class="menu-card">
        <span class="menu-icon">📊</span>
        <span class="menu-label">Statistik</span>
        <span class="menu-desc">Lihat data</span>
      </a>
      <a href="#" class="menu-card">
        <span class="menu-icon">⚙️</span>
        <span class="menu-label">Setting</span>
        <span class="menu-desc">Konfigurasi</span>
      </a>
      <a href="#" onclick="logout()" class="menu-card">
        <span class="menu-icon">🚪</span>
        <span class="menu-label">Logout</span>
        <span class="menu-desc">Keluar akun</span>
      </a>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <a href="#" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Member</span>
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Stats</span>
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Setting</span>
    </a>
  </div>

  <script src="transition.js"></script>
  <script>
    // Tampilkan nama & role dari sessionStorage
    const savedUser = sessionStorage.getItem('loggedUser');
    if (!savedUser) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(savedUser);
      document.getElementById('displayName').textContent = user.username.toUpperCase();
      document.getElementById('displayRole').textContent = user.role === 'owner' ? '👑 Owner' : '👤 Member';
    }

    // Cek video, kalau gagal load tampil placeholder
    const video = document.getElementById('bgVideo');
    video.addEventListener('error', () => {
      video.style.display = 'none';
      document.getElementById('videoPlaceholder').style.display = 'flex';
    });

    video.addEventListener('loadeddata', () => {
      document.getElementById('videoPlaceholder').style.display = 'none';
    });

    if (video.readyState === 0) {
      setTimeout(() => {
        if (video.readyState === 0) {
          video.style.display = 'none';
          document.getElementById('videoPlaceholder').style.display = 'flex';
        }
      }, 2000);
    }

    function logout() {
      sessionStorage.removeItem('loggedUser');
      goTo('index.html');
    }
  </script>

</body>
</html>
