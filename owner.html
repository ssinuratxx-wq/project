<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Owner - SOPARXXZ</title>
  <link rel="stylesheet" href="transition.css"/>
  <link rel="stylesheet" href="owner.css"/>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="Logo"/>
      <div class="sidebar-logo-text">
        <h2>SOPARXXZ</h2>
        <span>Powered by Sopar</span>
      </div>
    </div>

    <div class="nav-section">
      <p class="nav-label">Menu</p>

      <a href="#" class="nav-item active" id="navDashboard">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="#" class="nav-item" id="navMember" onclick="goTo('member.html'); return false;">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Member
      </a>
      <a href="#" class="nav-item" id="navStats">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Statistik
      </a>
      <a href="#" class="nav-item" id="navSetting">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Setting
      </a>
      <a href="#" class="nav-item danger" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>

    <div class="sidebar-bottom">
      <div class="user-card">
        <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="User"/>
        <div class="user-card-text">
          <h4 id="displayName">OWNER</h4>
          <span id="displayRole">Owner</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <h1 class="page-title">DASHBOARD</h1>
    <p class="page-sub">Selamat datang kembali, <span id="welcomeName">Owner</span></p>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div class="stat-label">Total Member</div>
        <div class="stat-value">24</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="stat-label">Bot Status</div>
        <div class="stat-value online">ONLINE</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <div class="stat-label">Pesan Hari Ini</div>
        <div class="stat-value">130</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="stat-label">Uptime</div>
        <div class="stat-value" style="font-size:15px;">12h 30m</div>
      </div>
    </div>
  </div>

  <!-- MUSIC BUTTON -->
  <div id="musicBtn" onclick="toggleMusic()">
    <svg id="musicIcon" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
  </div>

  <audio id="bgMusic" src="assets/musik.mp3" loop></audio>

  <script src="transition.js"></script>
  <script>
    // Cek session
    const savedUser = sessionStorage.getItem('loggedUser');
    if (!savedUser) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(savedUser);
      document.getElementById('displayName').textContent = user.username.toUpperCase();
      document.getElementById('welcomeName').textContent = user.username;
      document.getElementById('displayRole').textContent = user.role === 'owner' ? '👑 Owner' : '👤 Member';
    }

    // Music
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const musicIcon = document.getElementById('musicIcon');
    let musicStarted = false;

    const muteIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;
    const playIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>`;

    function startMusic() {
      if (!musicStarted) {
        music.volume = 0.5;
        music.play().then(() => { musicStarted = true; }).catch(() => {});
      }
    }

    function toggleMusic() {
      if (music.paused) {
        music.play();
        musicBtn.innerHTML = playIcon;
      } else {
        music.pause();
        musicBtn.innerHTML = muteIcon;
      }
    }

    document.addEventListener('click', startMusic, { once: true });
    document.addEventListener('touchstart', startMusic, { once: true });

    window.addEventListener('load', () => {
      music.play().then(() => { musicStarted = true; }).catch(() => {});
    });

    function logout() {
      sessionStorage.removeItem('loggedUser');
      goTo('index.html');
    }
  </script>

</body>
</html>
