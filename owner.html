<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Owner - SOPARXXZ</title>
  <link rel="stylesheet" href="transition.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #07071a;
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* TOP BAR */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: rgba(7,7,26,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .top-bar-logo { display: flex; align-items: center; gap: 10px; }

    .top-bar-logo img {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid #a855f7;
    }

    .top-bar-logo span {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 900; letter-spacing: 1px;
    }

    .menu-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .menu-btn:active { transform: scale(0.92); }
    .menu-btn:hover { background: rgba(168,85,247,0.15); }

    .menu-btn svg {
      width: 20px; height: 20px;
      stroke: #fff; fill: none;
      stroke-width: 2; stroke-linecap: round;
    }

    /* DRAWER */
    .drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(2px);
      z-index: 90;
    }

    .drawer-overlay.show { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .drawer {
      position: fixed; top: 0; right: -280px;
      width: 260px; height: 100vh;
      background: #10102a;
      border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 100;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
      padding: 24px 0;
    }

    .drawer.show { right: 0; }

    .drawer-header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .drawer-header img {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #a855f7;
    }

    .drawer-header h4 { font-size: 14px; font-weight: 700; }
    .drawer-header span { font-size: 11px; color: #a855f7; }

    .drawer-nav { padding: 16px 12px 0; flex: 1; }

    .drawer-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 4px;
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      font-size: 14px; font-weight: 600;
      transition: background 0.2s, transform 0.15s, color 0.2s;
    }

    .drawer-item:active { transform: scale(0.96); }
    .drawer-item:hover { background: rgba(168,85,247,0.1); color: #fff; }

    .drawer-item.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(168,85,247,0.1));
      color: #fff;
    }

    .drawer-item svg {
      width: 18px; height: 18px;
      stroke: rgba(255,255,255,0.5);
      fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .drawer-item.active svg { stroke: #a855f7; }
    .drawer-item.danger { color: rgba(239,68,68,0.6); }
    .drawer-item.danger svg { stroke: rgba(239,68,68,0.6); }

    /* VIDEO */
    .video-section {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
    }

    .video-section video { width: 100%; height: 100%; object-fit: cover; }

    .video-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1), #07071a);
    }

    .video-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a0a2e, #2d1b69, #1a0a2e);
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
    }

    .video-placeholder svg {
      width: 36px; height: 36px;
      stroke: rgba(255,255,255,0.2);
      fill: none; stroke-width: 1.5;
    }

    .video-placeholder p {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
    }

    /* MAIN */
    .main {
      padding: 0 18px 60px;
      max-width: 600px;
      margin: 0 auto;
    }

    .page-header {
      text-align: center;
      margin: -30px 0 24px;
      position: relative;
      z-index: 2;
    }

    .page-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }

    .page-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    /* STAT CARDS */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 16px 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    }

    .stat-card:active { transform: scale(0.95); box-shadow: 0 0 16px rgba(168,85,247,0.2); }
    .stat-card:hover { background: rgba(168,85,247,0.07); border-color: rgba(168,85,247,0.2); }

    .stat-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: rgba(168,85,247,0.15);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }

    .stat-icon svg {
      width: 16px; height: 16px;
      stroke: #a855f7; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .stat-icon.green { background: rgba(34,197,94,0.12); }
    .stat-icon.green svg { stroke: #22c55e; }

    .stat-label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 19px; font-weight: 900;
      color: #fff;
    }

    .stat-value.online { font-size: 13px; color: #22c55e; letter-spacing: 1px; }

    /* GRAPH CARDS */
    .graph-section { margin-bottom: 20px; }

    .section-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .graph-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .graph-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 16px;
    }

    .graph-title {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .graph-current {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 10px;
    }

    .graph-current span {
      font-size: 10px;
      color: #22c55e;
      font-family: 'Rajdhani', sans-serif;
      margin-left: 4px;
    }

    .graph-canvas-wrap {
      width: 100%;
      height: 50px;
    }

    .graph-canvas-wrap svg { width: 100%; height: 100%; }

    .graph-line {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .graph-fill { opacity: 0.15; }

    /* MUSIC */
    #musicBtn {
      position: fixed; bottom: 20px; right: 20px;
      z-index: 60;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(168,85,247,0.2);
      border: 1.5px solid rgba(168,85,247,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.2s, transform 0.15s;
    }

    #musicBtn:active { transform: scale(0.9); }

    #musicBtn svg {
      width: 20px; height: 20px;
      stroke: #a855f7; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-logo">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="Logo"/>
      <span>SOPARXXZ</span>
    </div>
    <div class="menu-btn" onclick="toggleDrawer()">
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="12" y1="12" x2="12.01" y2="12"/><line x1="21" y1="12" x2="21.01" y2="12"/></svg>
    </div>
  </div>

  <!-- DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <img src="https://i.ibb.co.com/x8rZhtZd/IMG-20260629-WA0036.jpg" alt="User"/>
      <div>
        <h4 id="displayName">OWNER</h4>
        <span>👑 Owner</span>
      </div>
    </div>

    <div class="drawer-nav">
      <a href="#" class="drawer-item active">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="#" class="drawer-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Setting
      </a>
      <a href="#" class="drawer-item danger" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </div>

  <!-- VIDEO -->
  <div class="video-section">
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="assets/ourin-mp4.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <div class="video-placeholder" id="videoPlaceholder">
      <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      <p>VIDEO BELUM TERSEDIA</p>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="page-header">
      <h1 class="page-title">DASHBOARD</h1>
      <p class="page-sub">Selamat datang, <span id="welcomeName">Owner</span></p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div class="stat-label">Total Member</div>
        <div class="stat-value" id="totalMember">24</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="stat-label">Bot Status</div>
        <div class="stat-value online">ONLINE</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <div class="stat-label">Pesan Hari Ini</div>
        <div class="stat-value" id="msgToday">130</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="stat-label">Uptime</div>
        <div class="stat-value" style="font-size:14px;" id="uptime">12h 30m</div>
      </div>
    </div>

    <div class="graph-section">
      <p class="section-label">Statistik Realtime</p>
      <div class="graph-grid">

        <div class="graph-card">
          <div class="graph-title">CPU Usage</div>
          <div class="graph-current" id="cpuValue">0%<span>● live</span></div>
          <div class="graph-canvas-wrap"><svg id="graphCpu" viewBox="0 0 100 30" preserveAspectRatio="none"></svg></div>
        </div>

        <div class="graph-card">
          <div class="graph-title">Memory</div>
          <div class="graph-current" id="memValue">0 MB<span>● live</span></div>
          <div class="graph-canvas-wrap"><svg id="graphMem" viewBox="0 0 100 30" preserveAspectRatio="none"></svg></div>
        </div>

        <div class="graph-card">
          <div class="graph-title">Pesan Masuk</div>
          <div class="graph-current" id="msgValue">0/min<span>● live</span></div>
          <div class="graph-canvas-wrap"><svg id="graphMsg" viewBox="0 0 100 30" preserveAspectRatio="none"></svg></div>
        </div>

        <div class="graph-card">
          <div class="graph-title">Latency</div>
          <div class="graph-current" id="pingValue">0ms<span>● live</span></div>
          <div class="graph-canvas-wrap"><svg id="graphPing" viewBox="0 0 100 30" preserveAspectRatio="none"></svg></div>
        </div>

      </div>
    </div>
  </div>

  <!-- MUSIC -->
  <div id="musicBtn" onclick="toggleMusic()">
    <svg id="musicIcon" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
  </div>

  <audio id="bgMusic" src="assets/musik.mp3" loop></audio>

  <script src="transition.js"></script>
  <script>
    const savedUser = sessionStorage.getItem('loggedUser');
    if (!savedUser) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(savedUser);
      document.getElementById('displayName').textContent = user.username.toUpperCase();
      document.getElementById('welcomeName').textContent = user.username;
    }

    function toggleDrawer() {
      document.getElementById('drawer').classList.toggle('show');
      document.getElementById('drawerOverlay').classList.toggle('show');
    }

    const video = document.getElementById('bgVideo');
    video.addEventListener('error', () => {
      video.style.display = 'none';
      document.getElementById('videoPlaceholder').style.display = 'flex';
    });

    // ===== SIMULASI GRAFIK REALTIME =====
    function createGraph(svgId, color, initial, range) {
      const svg = document.getElementById(svgId);
      let data = Array(20).fill(initial);

      function render() {
        // geser data, tambah angka baru random
        data.shift();
        const last = data[data.length - 1];
        let next = last + (Math.random() - 0.5) * range;
        next = Math.max(0, Math.min(100, next));
        data.push(next);

        const points = data.map((v, i) => `${(i / (data.length - 1)) * 100},${30 - (v / 100) * 28 - 1}`).join(' ');
        const fillPoints = `0,30 ${points} 100,30`;

        svg.innerHTML = `
          <polyline class="graph-fill" points="${fillPoints}" fill="${color}" stroke="none"/>
          <polyline class="graph-line" points="${points}" stroke="${color}"/>
        `;

        return data[data.length - 1];
      }

      render();
      return render;
    }

    const renderCpu = createGraph('graphCpu', '#a855f7', 35, 15);
    const renderMem = createGraph('graphMem', '#6366f1', 45, 12);
    const renderMsg = createGraph('graphMsg', '#22c55e', 25, 20);
    const renderPing = createGraph('graphPing', '#f59e0b', 30, 18);

    function updateGraphs() {
      const cpu = renderCpu();
      const mem = renderMem();
      const msg = renderMsg();
      const ping = renderPing();

      document.getElementById('cpuValue').innerHTML = `${cpu.toFixed(0)}%<span>● live</span>`;
      document.getElementById('memValue').innerHTML = `${(mem * 5).toFixed(0)} MB<span>● live</span>`;
      document.getElementById('msgValue').innerHTML = `${msg.toFixed(0)}/min<span>● live</span>`;
      document.getElementById('pingValue').innerHTML = `${(ping * 3).toFixed(0)}ms<span>● live</span>`;
    }

    updateGraphs();
    setInterval(updateGraphs, 1500);

    // Uptime counter simulasi
    let uptimeSeconds = 12 * 3600 + 30 * 60;
    setInterval(() => {
      uptimeSeconds++;
      const h = Math.floor(uptimeSeconds / 3600);
      const m = Math.floor((uptimeSeconds % 3600) / 60);
      document.getElementById('uptime').textContent = `${h}h ${m}m`;
    }, 60000);

    // Music
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const muteIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;
    const playIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>`;

    function toggleMusic() {
      if (music.paused) {
        music.play();
        musicBtn.innerHTML = playIcon;
      } else {
        music.pause();
        musicBtn.innerHTML = muteIcon;
      }
    }

    window.addEventListener('load', () => music.play().catch(() => {}));
    document.addEventListener('click', () => {
      if (music.paused) music.play().catch(() => {});
    }, { once: true });

    function logout() {
      sessionStorage.removeItem('loggedUser');
      goTo('index.html');
    }
  </script>

</body>
</html>
