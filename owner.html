<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Owner - SOPARXXZ</title>
  <link rel="stylesheet" href="transition.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #07071a;
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* TOP BAR */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: rgba(7,7,26,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .top-bar-logo { display: flex; align-items: center; gap: 10px; }

    .top-bar-logo img {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid #a855f7;
    }

    .top-bar-logo span {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 900; letter-spacing: 1px;
    }

    .menu-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .menu-btn:active { transform: scale(0.92); }
    .menu-btn:hover { background: rgba(168,85,247,0.15); }

    .menu-btn svg {
      width: 20px; height: 20px;
      stroke: #fff; fill: none;
      stroke-width: 2; stroke-linecap: round;
    }

    /* DRAWER */
    .drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(2px);
      z-index: 90;
    }

    .drawer-overlay.show { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .drawer {
      position: fixed; top: 0; right: -280px;
      width: 260px; height: 100vh;
      background: #10102a;
      border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 100;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
      padding: 24px 0;
    }

    .drawer.show { right: 0; }

    .drawer-header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .drawer-header img {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #a855f7;
    }

    .drawer-header h4 { font-size: 14px; font-weight: 700; }
    .drawer-header span { font-size: 11px; color: #a855f7; }

    .drawer-nav { padding: 16px 12px 0; flex: 1; }

    .drawer-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 4px;
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      font-size: 14px; font-weight: 600;
      transition: background 0.2s, transform 0.15s, color 0.2s;
    }

    .drawer-item:active { transform: scale(0.96); }
    .drawer-item:hover { background: rgba(168,85,247,0.1); color: #fff; }

    .drawer-item.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(168,85,247,0.1));
      color: #fff;
    }

    .drawer-item svg {
      width: 18px; height: 18px;
      stroke: rgba(255,255,255,0.5);
      fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .drawer-item.active svg { stroke: #a855f7; }
    .drawer-item.danger { color: rgba(239,68,68,0.6); }
    .drawer-item.danger svg { stroke: rgba(239,68,68,0.6); }

    /* VIDEO */
    .video-section {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
    }

    .video-section video { width: 100%; height: 100%; object-fit: cover; }

    .video-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1), #07071a);
    }

    .video-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a0a2e, #2d1b69, #1a0a2e);
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
    }

    .video-placeholder svg {
      width: 36px; height: 36px;
      stroke: rgba(255,255,255,0.2);
      fill: none; stroke-width: 1.5;
    }

    .video-placeholder p {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
    }

    /* MAIN */
    .main {
      padding: 0 18px 60px;
      max-width: 600px;
      margin: 0 auto;
    }

    .page-header {
      text-align: center;
      margin: -30px 0 24px;
      position: relative;
      z-index: 2;
    }

    .page-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }

    .page-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    /* STAT CARDS */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 16px 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    }

    .stat-card:active { transform: scale(0.95); box-shadow: 0 0 16px rgba(168,85,247,0.2); }
    .stat-card:hover { background: rgba(168,85,247,0.07); border-color: rgba(168,85,247,0.2); }

    .stat-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: rgba(168,85,247,0.15);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }

    .stat-icon svg {
      width: 16px; height: 16px;
      stroke: #a855f7; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .stat-icon.green { background: rgba(34,197,94,0.12); }
    .stat-icon.green svg { stroke: #22c55e; }

    .stat-label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 19px; font-weight: 900;
      color: #fff;
    }

    .stat-value.online { font-size: 13px; color: #22c55e; letter-spacing: 1px; }

    /* GRAPH CARDS */
    .graph-section { margin-bottom: 20px; }

    .section-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .graph-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .graph-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 16px;
    }

    .graph-title {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .graph-current {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 10px;
    }

    .graph-current span {
      font-size: 10px;
      color: #22c55e;
      font-family: 'Rajdhani', sans-serif;
      margin-left: 4px;
    }

    .graph-canvas-wrap {
      width: 100%;
      height: 60px;
      position: relative;
    }

    .graph-canvas-wrap svg { width: 100%; height: 100%; overflow: visible; }

    .graph-line {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px currentColor);
    }

    .candle-up { fill: #22c55e; }
    .candle-down { fill: #ef4444; }
    .candle-wick { stroke-width: 0.8; }

    .graph-grid-line {
      stroke: rgba(255,255,255,0.05);
      stroke-width: 0.5;
    }

    .graph-percent {
      font-size: 10px;
      font-weight: 700;
      margin-left: 6px;
    }

    .percent-up { color: #22c55e; }
    .percent-down { color: #ef4444; }

    /* MUSIC */
    #musicBtn {
      position: fixed; bottom: 20px; right: 20px;
      z-index: 60;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(168,85,247,0.2);
      border: 1.5px solid rgba(168,85,247,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.2s, transform 0.15s;
    }

    #musicBtn:active { transform: scale(0.9); }

    #musicBtn svg {
      width: 20px; height: 20px;
      stroke: #a855f7; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
  </style>
</head>

  <script>
    const savedUser = sessionStorage.getItem('loggedUser');
    if (!savedUser) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(savedUser);
      document.getElementById('displayName').textContent = user.username.toUpperCase();
      document.getElementById('welcomeName').textContent = user.username;
    }

    function toggleDrawer() {
      document.getElementById('drawer').classList.toggle('show');
      document.getElementById('drawerOverlay').classList.toggle('show');
    }

    const video = document.getElementById('bgVideo');
    video.addEventListener('error', () => {
      video.style.display = 'none';
      document.getElementById('videoPlaceholder').style.display = 'flex';
    });

    // ===== DATA REAL DARI VPS =====
    const API = 'https://partly-easter-flashing.ngrok-free.dev';

    function formatUptime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      return `${h}h ${m}m`;
    }

    // History data buat chart (diisi dari data real tiap fetch)
    const history = {
      mem: [],
      msg: [],
      cmd: [],
      cpu: []
    };
    const MAX_POINTS = 14;

    function pushHistory(key, value) {
      history[key].push(value);
      if (history[key].length > MAX_POINTS) history[key].shift();
    }

    function renderCandleChart(svgId, dataArr, color) {
      const svg = document.getElementById(svgId);
      const ns = "http://www.w3.org/2000/svg";
      svg.innerHTML = '';

      if (dataArr.length < 2) return { percent: 0 };

      const max = Math.max(...dataArr, 1);
      const min = Math.min(...dataArr, 0);
      const rangeVal = max - min || 1;

      const w = 100 / dataArr.length;
      const bodyW = w * 0.55;

      for (let g = 1; g < 3; g++) {
        const gl = document.createElementNS(ns, 'line');
        gl.setAttribute('x1', 0);
        gl.setAttribute('x2', 100);
        gl.setAttribute('y1', (40 / 3) * g);
        gl.setAttribute('y2', (40 / 3) * g);
        gl.setAttribute('class', 'graph-grid-line');
        svg.appendChild(gl);
      }

      dataArr.forEach((val, i) => {
        if (i === 0) return;
        const prev = dataArr[i - 1];
        const x = i * w + w / 2;
        const isUp = val >= prev;
        const yPrev = 40 - ((prev - min) / rangeVal) * 38 - 1;
        const yVal = 40 - ((val - min) / rangeVal) * 38 - 1;

        const wick = document.createElementNS(ns, 'line');
        wick.setAttribute('x1', x);
        wick.setAttribute('x2', x);
        wick.setAttribute('y1', Math.min(yPrev, yVal) - 2);
        wick.setAttribute('y2', Math.max(yPrev, yVal) + 2);
        wick.setAttribute('stroke', isUp ? '#22c55e' : '#ef4444');
        wick.setAttribute('class', 'candle-wick');
        svg.appendChild(wick);

        const body = document.createElementNS(ns, 'rect');
        const bodyTop = Math.min(yPrev, yVal);
        const bodyHeight = Math.max(1, Math.abs(yVal - yPrev));
        body.setAttribute('x', x - bodyW / 2);
        body.setAttribute('y', bodyTop);
        body.setAttribute('width', bodyW);
        body.setAttribute('height', bodyHeight);
        body.setAttribute('class', isUp ? 'candle-up' : 'candle-down');
        svg.appendChild(body);
      });

      const percent = ((dataArr[dataArr.length - 1] - dataArr[0]) / (dataArr[0] || 1)) * 100;
      return { percent };
    }

    function percentBadge(percent) {
      const isUp = percent >= 0;
      return `<span class="graph-percent ${isUp ? 'percent-up' : 'percent-down'}">${isUp ? '▲' : '▼'} ${Math.abs(percent).toFixed(1)}%</span>`;
    }

    async function fetchDashboardStats() {
      try {
        const res = await fetch(`${API}/dashboard-stats?ngrok-skip-browser-warning=true`);
        const data = await res.json();

        // Stat cards
        document.getElementById('totalMember').textContent = data.totalMember;
        document.getElementById('uptime').textContent = formatUptime(data.uptimeMs);
        document.getElementById('msgToday').textContent = data.messagesProcessed;

        const statusEl = document.getElementById('botStatus');
        statusEl.textContent = data.botStatus.toUpperCase();
        statusEl.style.color = data.botStatus === 'online' ? '#22c55e' : '#ef4444';

        // Push ke history buat chart
        pushHistory('mem', data.memoryUsageMB);
        pushHistory('msg', data.messagesProcessed);
        pushHistory('cmd', data.commandsExecuted);
        pushHistory('cpu', data.cpuLoad);

        const memResult = renderCandleChart('graphMem', history.mem, '#6366f1');
        const msgResult = renderCandleChart('graphMsg', history.msg, '#22c55e');
        const cmdResult = renderCandleChart('graphPing', history.cmd, '#f59e0b');
        const cpuResult = renderCandleChart('graphCpu', history.cpu, '#a855f7');

        document.getElementById('memValue').innerHTML = `${data.memoryUsageMB} MB ${percentBadge(memResult.percent)}`;
        document.getElementById('msgValue').innerHTML = `${data.messagesProcessed} total ${percentBadge(msgResult.percent)}`;
        document.getElementById('pingValue').innerHTML = `${data.commandsExecuted} cmd ${percentBadge(cmdResult.percent)}`;
        document.getElementById('cpuValue').innerHTML = `${data.cpuLoad.toFixed(2)}s ${percentBadge(cpuResult.percent)}`;

      } catch (err) {
        document.getElementById('uptime').textContent = '-- offline';
      }
    }

    fetchDashboardStats();
    setInterval(fetchDashboardStats, 5000);

    // Music
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const muteIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;
    const playIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>`;

    function toggleMusic() {
      if (music.paused) {
        music.play();
        musicBtn.innerHTML = playIcon;
      } else {
        music.pause();
        musicBtn.innerHTML = muteIcon;
      }
    }

    window.addEventListener('load', () => music.play().catch(() => {}));
    document.addEventListener('click', () => {
      if (music.paused) music.play().catch(() => {});
    }, { once: true });

    function logout() {
      sessionStorage.removeItem('loggedUser');
      goTo('index.html');
    }
  </script>

</body>
</html>
